<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podos Wellness | Ficha de Anamnese Digital</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="indexPi.css">
</head>

<body class="min-h-screen flex items-start justify-center p-4 sm:p-8">
    <div id="app" class="w-full max-w-3xl bg-white shadow-2xl rounded-xl overflow-hidden mt-8">

        <!-- Cabeçalho -->
        <header class="bg-primary p-6 sm:p-8 flex items-center justify-center rounded-t-xl relative">
            <div class="flex items-center space-x-3">
                <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C6.477 2 2 6.477 2 12..." fill="currentColor"/>
                </svg>
                <h1 class="text-2xl sm:text-3xl font-bold text-white tracking-wider">Podos Wellness</h1>
            </div>
            <span class="absolute right-6 top-8 text-white text-xs font-semibold">Anamnese Digital</span>
        </header>

        <!-- Formulário -->
        <form id="anamneseForm" class="p-6 sm:p-10">
            <div id="progress-container" class="flex justify-between items-center mb-8">
                <div class="text-center">
                    <div id="dot-1" class="w-4 h-4 rounded-full bg-primary mx-auto mb-1"></div>
                    <span class="text-sm font-semibold text-primary">1. Dados Pessoais</span>
                </div>
                <div class="flex-grow h-0.5 bg-gray-200 mx-4"></div>
                <div class="text-center">
                    <div id="dot-2" class="w-4 h-4 rounded-full bg-gray-300 mx-auto mb-1"></div>
                    <span id="label-2" class="text-sm font-medium text-gray-500">2. Informações de Saúde</span>
                </div>
            </div>

            <!-- Etapa 1 -->
            <div id="step-1" class="step-content">
                <h2 class="text-xl font-bold text-gray-700 mb-6 border-b pb-2">Informações de Identificação</h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="nome">Nome Completo <span class="text-red-500">*</span></label>
                        <input type="text" id="nome" name="nome" required class="input-field">
                    </div>
                    <div>
                        <label for="nascimento">Data de Nascimento <span class="text-red-500">*</span></label>
                        <input type="date" id="nascimento" name="nascimento" required class="input-field">
                    </div>
                    <div>
                        <label for="cpf">CPF <span class="text-red-500">*</span></label>
                        <input type="text" id="cpf" name="cpf" required maxlength="14" placeholder="000.000.000-00" class="input-field">
                    </div>
                    <div>
                        <label for="telefone">Telefone (WhatsApp) <span class="text-red-500">*</span></label>
                        <input type="tel" id="telefone" name="telefone" required maxlength="15" placeholder="(99) 99999-9999" class="input-field">
                    </div>
                    <div class="md:col-span-2">
                        <label for="email">E-mail <span class="text-red-500">*</span></label>
                        <input type="email" id="email" name="email" required class="input-field">
                    </div>
                    <div class="md:col-span-2">
                        <label for="profissao">Profissão</label>
                        <input type="text" id="profissao" name="profissao" class="input-field">
                    </div>
                </div>

                <div class="flex justify-end mt-8">
                    <button type="button" onclick="nextStep()" class="btn-primary">Próxima Etapa (Saúde)</button>
                </div>
            </div>

            <!-- Etapa 2 -->
            <div id="step-2" class="step-content hidden">
                <h2 class="text-xl font-bold text-gray-700 mb-6 border-b pb-2">Informações de Saúde</h2>
                <div>
                    <label for="observacoes">Observações gerais de saúde:</label>
                    <textarea id="observacoes" name="observacoes" rows="5" class="input-field"></textarea>
                </div>

                <div class="flex justify-between mt-8">
                    <button type="button" onclick="prevStep()" class="btn-primary bg-gray-400">Voltar</button>
                    <button type="submit" id="submitButton" class="btn-primary">
                        <span id="submitText">Enviar</span>
                        <span id="loader" class="loader hidden ml-2"></span>
                    </button>
                </div>
            </div>

            <!-- Etapa 3 -->
            <div id="step-3" class="step-content hidden text-center p-8">
                <svg class="w-16 h-16 text-primary mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9..."/></svg>
                <h2 class="text-2xl font-bold text-gray-700 mb-4">Anamnese Concluída!</h2>
                <p class="text-gray-600 mb-8">Suas informações foram enviadas com sucesso.</p>
                <button type="button" onclick="location.reload()" class="btn-primary">Novo Atendimento</button>
            </div>

            <!-- Modal de Erro -->
            <div id="errorModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                    <h3 class="text-xl font-bold text-red-600 mb-4">Atenção!</h3>
                    <p id="errorMessage" class="text-gray-700 mb-6"></p>
                    <button type="button" onclick="document.getElementById('errorModal').classList.add('hidden')" class="bg-primary text-white py-2 px-4 rounded-lg w-full">Entendi</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Firebase -->
     <footer>
    <p>&copy; Bem Estar e Saúde!</p>
    </footer>
    <script type="module" src="indexPi.js"></script>
</body>
</html>
